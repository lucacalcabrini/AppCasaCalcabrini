name: Build APK Casa & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # serve per creare le Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Compute version
        id: ver
        run: |
          BASE=$(node -p "require('./package.json').version")
          VERSION="${BASE}.${{ github.run_number }}"
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "Versione: $VERSION (code ${{ github.run_number }})"

      - name: Inject version into build.gradle
        run: |
          sed -i "s/versionCode 1$/versionCode ${{ steps.ver.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${{ steps.ver.outputs.name }}\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Restore keystore (signing stabile)
        run: |
          mkdir -p "$HOME/.android"
          printf '%s' "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > "$HOME/.android/debug.keystore"
          # Esporta il path reale come variabile d'ambiente per i passi successivi
          echo "KEYSTORE_PATH=$HOME/.android/debug.keystore" >> $GITHUB_ENV
          # Verifica integrità e stampa fingerprint SHA-256
          keytool -list -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey -noprompt 2>&1 \
            | grep -E "SHA256|SHA1|Owner|Alias|Valid" \
            && echo "✓ Keystore valido — path: $HOME/.android/debug.keystore" \
            || { echo "✗ Keystore non valido — STOP"; exit 1; }

      - run: npm install
      - name: Build frontend (Vite)
        run: npm run build
        env:
          VITE_AWS_IOT_TOKEN: ${{ secrets.AWS_IOT_TOKEN }}
      - run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          # KEYSTORE_PATH viene dal passo "Restore keystore" via $GITHUB_ENV → path reale del runner
          KEYSTORE_STORE_PASS: android
          KEYSTORE_ALIAS: androiddebugkey
          KEYSTORE_KEY_PASS: android

      - name: Verifica firma APK prodotto
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "=== Fingerprint certificato APK ==="
          keytool -printcert -jarfile $APK 2>/dev/null | grep -E "SHA256|SHA1|Owner" \
            || echo "(keytool -jarfile non supportato, usando apksigner)"
          # Confronta con keystore: devono coincidere
          echo "=== Fingerprint keystore (deve essere IDENTICO) ==="
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -noprompt 2>&1 \
            | grep "SHA256"

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Casa-${{ steps.ver.outputs.name }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Casa-APK
          path: Casa-${{ steps.ver.outputs.name }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Casa ${{ steps.ver.outputs.name }}
          body: |
            Build automatica da commit ${{ github.sha }}
            Versione: ${{ steps.ver.outputs.name }}

            Commit:
            ${{ github.event.head_commit.message }}
          files: Casa-${{ steps.ver.outputs.name }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
