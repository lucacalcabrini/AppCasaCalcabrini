name: Build APK Casa

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: npm ci

      - run: npm run build

      - run: npx cap sync android

      - name: Fix dipendenze e conflitti
        run: |
          sed -i "s/bcprov-jdk15on:1.70/bcprov-jdk18on:1.75/g" android/app/build.gradle
          cat >> android/app/build.gradle << 'GRADLE'
          android {
            packagingOptions {
              resources {
                excludes += [
                  'META-INF/INDEX.LIST',
                  'META-INF/io.netty.versions.properties',
                  'META-INF/DEPENDENCIES',
                  'META-INF/*.kotlin_module',
                  'META-INF/LICENSE',
                  'META-INF/NOTICE',
                  'META-INF/ASL2.0'
                ]
                pickFirsts += [
                  'org/bouncycastle/**',
                  'META-INF/services/**',
                  'META-INF/versions/**',
                  'com/sun/activation/**',
                  'com/sun/istack/**',
                  'javax/activation/**'
                ]
              }
            }
          }
          GRADLE

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: Casa-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
