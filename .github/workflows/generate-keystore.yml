name: Generate Debug Keystore (esegui UNA volta sola)

on:
  workflow_dispatch:  # solo manuale

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Genera debug.keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Converti in base64 e salva in file
        run: base64 -w 0 debug.keystore > debug_keystore_base64.txt

      - name: Upload base64 come artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore-base64
          path: debug_keystore_base64.txt
          retention-days: 1
